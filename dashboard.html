<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Meridian</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-container { padding: 8rem 1.5rem 4rem; max-width: 1000px; margin: 0 auto; }
        .dashboard-table { width: 100%; border-collapse: collapse; margin-top: 2rem; }
        .dashboard-table th, .dashboard-table td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--border); }
        .dashboard-table th { color: var(--fg-muted); font-weight: 600; font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .status-badge { padding: 0.25rem 0.625rem; border-radius: 999px; font-size: 0.75rem; background: var(--accent-soft); color: var(--accent); }
    </style>
</head>
<body>
    <header class="nav" id="nav">
        <div class="container nav-inner">
            <a href="index.html" class="logo">Meridian</a>
            <div class="nav-cta" id="navAuth"></div>
            <button type="button" class="theme-toggle" aria-label="Toggle Theme" aria-pressed="false">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
            </button>
        </div>
    </header>

    <main class="dashboard-container">
        <h1>Admin Dashboard</h1>
        <p>Welcome back! Here are your latest contact form submissions.</p>
        
        <table class="dashboard-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Message</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="contactsTableBody">
                <!-- Data injected by JS -->
            </tbody>
        </table>
    </main>

    <script src="dashboard.js"></script>
</body>
</html>
